version: "3.8"

services:
  traefik:
    image: traefik:v3.6.1
    command:
      - "--providers.docker=true"
      - "--api.insecure=true"

    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  frontend:
    build: .
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`robertppv.win`)"
